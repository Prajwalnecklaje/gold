<!DOCTYPE html>
<html>
<head>
<title>Document Page</title>
</head>

<body>

<h2>Open Document</h2>

<a href="/testing/#/documents/12345/details">Go to Document</a>

<script>

function router() {

    const hash = window.location.hash;

    if(hash.includes("/documents/")){

        const parts = hash.split("/");
        const id = parts[2];

        document.body.innerHTML += "<p>Document ID: " + id + "</p>";
    }

}

router();

</script>

</body>
</html>
