<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        /* Navbar */
        .navbar {
            height: 60px;
            background: #1e293b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* Content */
        .content {
            height: calc(100vh - 110px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer */
        .footer {
            height: 50px;
            background: #1e293b;
            color: #cbd5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="llggo">MySite</div>
        <div class="nav-links">
            <a onclick="loadPage('home.html')">Home</a>
            <a onclick="loadPage('services.html')">Services</a>
            <a onclick="loadPage('about.html')">About</a>
        </div>
    </div>

    <!-- Iframe -->
    <div class="content">
        <iframe id="myFrame" src="home.html"></iframe>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 MySite | Built with ❤️
    </div>

    <script>
        function loadPage(page) {
            document.getElementById("myFrame").src = page;
        }
    </script>
   <script src="pendo/init.js"></script>

</body>
</html>
