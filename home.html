<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI';
        padding: 30px;
        background: #f8fafc;
    }

    .hero {
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        color: white;
        padding: 50px;
        border-radius: 15px;
    }

    .hero h1 {
        margin: 0;
        font-size: 36px;
    }

    .hero p {
        margin-top: 10px;
        font-size: 18px;
    }

    .cards {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .card h3 {
        margin: 0;
    }
</style>
</head>

<body>

<div class="hero">
    <h1>Welcome to MySite 🚀</h1>
    <p>Your modern web experience starts here.</p>
</div>

<div class="cards">
    <div class="card">
        <h3>Fast</h3>
        <p>Lightning fast performance.</p>
    </div>

    <div class="card">
        <h3>Secure</h3>
        <p>Top-level security for your data.</p>
    </div>

    <div class="card">
        <h3>Scalable</h3>
        <p>Grow your business without limits.</p>
    </div>
</div>

</body>
</html>
